<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindMeshLab — Kontakt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e5e7eb;
    background: #0a0a0b;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(180,180,190,0.08) 0%, transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(180,180,190,0.05) 0%, transparent 50%),
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: auto, auto, 48px 48px, 48px 48px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: 'M';
    position: absolute;
    right: -60px;
    bottom: -80px;
    font-family: 'Playfair Display', serif;
    font-size: 520px;
    font-weight: 700;
    color: rgba(255,255,255,0.025);
    pointer-events: none;
    line-height: 1;
  }

  .lang-switch {
    display: flex;
    gap: 6px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
  }
  .lang-switch button {
    background: transparent;
    border: none;
    color: #9ca3af;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .2s ease;
  }
  .lang-switch button:hover { color: #e5e7eb; }
  .lang-switch button.active {
    background: linear-gradient(180deg, #f3f4f6 0%, #9ca3af 100%);
    color: #0a0a0b;
    font-weight: 600;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: linear-gradient(180deg, rgba(20,20,22,0.9) 0%, rgba(12,12,14,0.9) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 40px 32px 32px;
    text-align: center;
    backdrop-filter: blur(14px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
    z-index: 1;
  }

  .brand { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo {
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo svg { width: 100%; height: 100%; }
  .brand-name {
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #9ca3af;
    font-weight: 500;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    line-height: 1.2;
    color: #f3f4f6;
    margin-bottom: 10px;
  }
  h1 .accent {
    background: linear-gradient(180deg, #ffffff 0%, #9ca3af 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  p.sub {
    color: #9ca3af;
    font-size: 14px;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 20px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-decoration: none;
    margin-bottom: 12px;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    border: 1px solid transparent;
  }
  .btn:active { transform: scale(0.985); }
  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  .btn-wa {
    background: linear-gradient(180deg, #25D366 0%, #1ea952 100%);
    color: #fff;
    box-shadow: 0 10px 28px rgba(37,211,102,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-wa:hover { box-shadow: 0 14px 36px rgba(37,211,102,0.35), inset 0 1px 0 rgba(255,255,255,0.25); }

  .btn-web {
    background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
    color: #f3f4f6;
    border-color: rgba(255,255,255,0.12);
  }
  .btn-web:hover { background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    color: #4b5563; font-size: 10px; letter-spacing: 0.25em;
    margin: 18px 0 14px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  .phone {
    font-size: 13px;
    color: #9ca3af;
    letter-spacing: 0.05em;
  }
  .phone strong { color: #e5e7eb; font-weight: 600; }

  footer {
    margin-top: 22px;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #4b5563;
  }

  [dir="rtl"] .btn { letter-spacing: 0; }
  [dir="rtl"] h1 { font-style: normal; font-family: 'Inter', sans-serif; font-weight: 600; }

  @media (max-width: 420px) {
    h1 { font-size: 26px; }
    .card { padding: 32px 22px 26px; }
  }
</style>
</head>
<body>

  <div class="lang-switch" role="tablist">
    <button type="button" data-lang="de" class="active">DE · DEUTSCH</button>
    <button type="button" data-lang="en">EN · ENGLISH</button>
    <button type="button" data-lang="ar">AR · العربية</button>
  </div>

  <div class="card">
    <div class="brand">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="mg" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="50%" stop-color="#9ca3af"/>
              <stop offset="100%" stop-color="#3f3f46"/>
            </linearGradient>
          </defs>
          <path d="M15 85 L15 25 L30 18 L50 55 L70 18 L85 25 L85 85 L72 85 L72 45 L55 78 L45 78 L28 45 L28 85 Z"
                fill="url(#mg)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
        </svg>
      </div>
      <div class="brand-name">MINDMESHLAB</div>
    </div>

    <h1 data-i18n="title"><span class="accent">Wie dürfen wir</span><br><em>Sie erreichen?</em></h1>
    <p class="sub" data-i18n="sub">Wählen Sie Ihren bevorzugten Kontaktweg — wir antworten in Deutsch, English &amp; العربية.</p>

    <a class="btn btn-wa" href="https://wa.me/4917625712727" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.52 3.48A11.93 11.93 0 0 0 12.04 0C5.5 0 .2 5.3.2 11.84c0 2.09.55 4.13 1.6 5.93L0 24l6.38-1.67a11.83 11.83 0 0 0 5.66 1.44h.01c6.54 0 11.84-5.3 11.84-11.84 0-3.16-1.23-6.14-3.47-8.45zM12.05 21.3h-.01a9.44 9.44 0 0 1-4.81-1.32l-.35-.2-3.79.99 1.01-3.69-.22-.38a9.46 9.46 0 0 1-1.45-5.06c0-5.23 4.26-9.48 9.5-9.48 2.54 0 4.92.99 6.71 2.78a9.42 9.42 0 0 1 2.78 6.71c0 5.23-4.26 9.48-9.49 9.48zm5.2-7.1c-.28-.14-1.68-.83-1.94-.93-.26-.09-.45-.14-.64.14-.19.28-.74.93-.9 1.12-.17.19-.33.21-.61.07-.28-.14-1.19-.44-2.27-1.4-.84-.75-1.4-1.67-1.57-1.95-.17-.28-.02-.43.12-.57.13-.13.28-.33.42-.5.14-.17.19-.28.28-.47.09-.19.05-.35-.02-.5-.07-.14-.64-1.55-.88-2.12-.23-.55-.47-.48-.64-.49l-.55-.01c-.19 0-.5.07-.76.35s-1 .98-1 2.39 1.03 2.77 1.17 2.96c.14.19 2.02 3.09 4.9 4.33.68.29 1.22.47 1.64.6.69.22 1.32.19 1.82.12.55-.08 1.68-.69 1.92-1.35.24-.66.24-1.22.17-1.35-.07-.13-.26-.2-.54-.34z"/></svg>
      <span data-i18n="btn_wa">WhatsApp — Direkt schreiben</span>
    </a>

    <a class="btn btn-web" href="https://www.mindmeshlab.de" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/>
      </svg>
      <span data-i18n="btn_web">Unsere Website besuchen</span>
    </a>

    <div class="divider" data-i18n="or">ODER · TELEFON</div>
    <a href="tel:+4917625712727" class="phone"><strong>+49 176 2571 2727</strong></a>

    <footer>§ 146A KONFORM · TSE INKLUSIVE</footer>
  </div>

<script>
  const i18n = {
    de: {
      title: '<span class="accent">Wie dürfen wir</span><br><em>Sie erreichen?</em>',
      sub: 'Wählen Sie Ihren bevorzugten Kontaktweg — wir antworten in Deutsch, English &amp; العربية.',
      btn_wa: 'WhatsApp — Direkt schreiben',
      btn_web: 'Unsere Website besuchen',
      or: 'ODER · TELEFON',
      dir: 'ltr'
    },
    en: {
      title: '<span class="accent">How can we</span><br><em>reach you?</em>',
      sub: 'Choose your preferred contact channel — we reply in German, English &amp; Arabic.',
      btn_wa: 'WhatsApp — Message us directly',
      btn_web: 'Visit our website',
      or: 'OR · CALL US',
      dir: 'ltr'
    },
    ar: {
      title: '<span class="accent">كيف يمكننا</span><br><em>التواصل معك؟</em>',
      sub: 'اختر طريقة التواصل المفضلة لديك — نرد عليك بالألمانية والإنجليزية والعربية.',
      btn_wa: 'واتساب — راسلنا مباشرة',
      btn_web: 'زيارة موقعنا الإلكتروني',
      or: 'أو · اتصل بنا',
      dir: 'rtl'
    }
  };

  const buttons = document.querySelectorAll('.lang-switch button');
  buttons.forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));

  function setLang(lang) {
    const t = i18n[lang];
    document.documentElement.lang = lang;
    document.documentElement.dir = t.dir;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.innerHTML = t[key];
    });
    buttons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  }
</script>
</body>
</html>
